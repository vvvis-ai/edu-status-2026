<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026년 사이버 교육 이수 현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8 font-sans">
    <div class="max-w-6xl mx-auto">

        <!-- Header -->
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                        <i data-lucide="book-open" class="text-blue-600"></i>
                        2026년 사이버 교육 이수 현황
                    </h1>
                    <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 flex items-center gap-1">
                        <i data-lucide="eye" class="w-3 h-3"></i> 조회 전용
                    </span>
                </div>
                <p class="text-slate-500 mt-1">부서 교육 진행 상태 현황판입니다. 이수 체크는 담당자가 직접 관리합니다.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="location.reload()"
                    class="bg-white border border-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-50 flex items-center gap-2 transition-all shadow-sm text-sm">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> 새로고침
                </button>
                <button onclick="copyStatus()"
                    class="bg-white border border-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-50 flex items-center gap-2 transition-all shadow-sm text-sm">
                    <i data-lucide="clipboard-copy" class="w-4 h-4"></i> 현황 복사
                </button>
            </div>
        </div>

        <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8"></div>
        <div id="courseCards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-4 border-b border-slate-100 flex flex-col md:flex-row justify-between gap-4">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="searchInput" placeholder="이름 또는 직급 검색..."
                        class="pl-10 pr-4 py-2 bg-slate-50 border-none rounded-lg text-sm w-full md:w-64 focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <div class="flex items-center gap-3 text-sm text-slate-500">
                    <div class="flex items-center gap-1"><i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500"></i> 완료</div>
                    <div class="flex items-center gap-1"><i data-lucide="circle" class="w-4 h-4 text-slate-300"></i> 미이수</div>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50"><tr id="tableHeaderRow"></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="emptyState" class="p-12 text-center text-slate-400 hidden">
                <i data-lucide="filter" class="mx-auto mb-2 opacity-20 w-12 h-12"></i>
                검색 결과가 없습니다.
            </div>
        </div>

        <div class="mt-6 flex flex-col md:flex-row gap-4 items-center justify-between text-xs text-slate-400 border-t border-slate-200 pt-6">
            <p>© 2026 부서 교육 관리 시스템 — 현황 조회용 (수정 불가)</p>
            <span id="lastUpdated" class="text-slate-400"></span>
        </div>
    </div>

    <script>
        // =========================================================
        // ★ 설정값 — 관리자 파일과 동일한 Worker 주소
        // =========================================================
        const API_ENDPOINT = 'https://my-dashboard-api.antae98.workers.dev';

        // ========== 데이터 ==========
        const courses = [
            { id: 1, name: '공직자 안보교육',     site: '부산광역시 인재개발원',   url: 'https://busan.nhi.go.kr',           deadline: '2026-06-19', mandatory: true },
            { id: 2, name: '직장 내 괴롭힘 예방', site: '동구청 사이버연수원',      url: 'https://bsdonggu.ubob.com',         deadline: '2026-06-30', mandatory: true },
            { id: 3, name: '장애인식개선교육',     site: '국가공무원인재개발원',     url: 'https://busan.nhi.go.kr',           deadline: '2026-09-04', mandatory: true },
            { id: 4, name: '4대 폭력예방 교육',   site: '부산광역시 인재개발원',    url: 'https://busan.nhi.go.kr',           deadline: '2026-09-30', mandatory: true },
            { id: 5, name: '성인지 교육',          site: '한국양성평등교육진흥원',   url: 'https://eqgender.kigepe.or.kr',     deadline: '2026-09-30', mandatory: true },
            { id: 6, name: '감염병 교육',          site: '부산광역시 인재개발원',    url: 'https://busan.nhi.go.kr',           deadline: '2026-12-03', mandatory: true },
            { id: 7, name: '긴급복지 신고의무',    site: 'KOHI 의무교육 플랫폼',    url: 'https://in.kohi.or.kr',             deadline: '2026-12-11', mandatory: true },
            { id: 8, name: '개인정보 보호',        site: '개인정보배움터',           url: 'https://edu.privacy.go.kr',         deadline: '2026-12-31', mandatory: true },
        ];

        const initialMembers = [
            { id: 1,  name: '허미영', position: '행정5급',        completions: [1, 2] },
            { id: 2,  name: '장해성', position: '행정6급',        completions: [1, 2, 3] },
            { id: 3,  name: '이정종', position: '행정6급',        completions: [1] },
            { id: 4,  name: '정경원', position: '행정6급',        completions: [1, 3] },
            { id: 5,  name: '유행연', position: '행정6급',        completions: [] },
            { id: 6,  name: '신봉일', position: '행정6급',        completions: [] },
            { id: 7,  name: '이시정', position: '행정7급',        completions: [] },
            { id: 8,  name: '전영옥', position: '행정8급',        completions: [] },
            { id: 9,  name: '안태욱', position: '행정9급',        completions: [] },
            { id: 10, name: '강소희', position: '시간선택제라급', completions: [] },
            { id: 11, name: '박경덕', position: '행정7급',        completions: [] },
            { id: 12, name: '심유나', position: '행정8급',        completions: [] },
            { id: 13, name: '이효민', position: '행정8급',        completions: [] },
            { id: 14, name: '성지혜', position: '시간선택제라급', completions: [] },
            { id: 15, name: '최유정', position: '시간선택제마급', completions: [] },
            { id: 16, name: '김인혜', position: '행정7급',        completions: [] },
            { id: 17, name: '문은진', position: '사서8급',        completions: [] },
            { id: 18, name: '이지희', position: '사서7급',        completions: [] },
            { id: 19, name: '김지연', position: '사서8급',        completions: [] },
            { id: 20, name: '양소라', position: '사서8급',        completions: [] },
            { id: 21, name: '안형진', position: '전산9급',        completions: [] },
            { id: 22, name: '한지성', position: '시간선택제마급', completions: [] },
            { id: 23, name: '이설희', position: '공무직',         completions: [] },
            { id: 24, name: '이민정', position: '사서7급',        completions: [] },
            { id: 25, name: '이창영', position: '기계운영6급',    completions: [] },
            { id: 26, name: '송준영', position: '사서8급',        completions: [] },
            { id: 27, name: '노금혜', position: '사서9급',        completions: [] },
            { id: 28, name: '김상득', position: '청원경찰',       completions: [] },
            { id: 29, name: '조영준', position: '청원경찰',       completions: [] },
            { id: 30, name: '이상윤', position: '청원경찰',       completions: [] },
        ];

        let members = JSON.parse(JSON.stringify(initialMembers));
        let searchTerm = '';

        document.getElementById('searchInput').addEventListener('input', e => {
            searchTerm = e.target.value.toLowerCase();
            renderTable();
        });

        // ========== 데이터 로드 (Cloudflare Worker) ==========
        async function loadData() {
            try {
                const res = await fetch(API_ENDPOINT);
                if (res.ok) {
                    const data = await res.json();
                    if (data?.members?.length) {
                        members = data.members;
                        document.getElementById('lastUpdated').textContent =
                            `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;
                    }
                }
            } catch(e) { /* 실패 시 초기 데이터 유지 */ }
            updateUI();
        }

        window.copyStatus = () => {
            const text = members.map(m => `${m.name}(${m.position}): ${m.completions.length}/${courses.length} 완료`).join('\n');
            navigator.clipboard.writeText(text).catch(() => {
                const el = document.createElement('textarea');
                el.value = text; document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el);
            });
        };

        // ========== 렌더링 ==========
        function updateUI() { renderStats(); renderCourses(); renderTable(); }

        function renderStats() {
            const total = members.length * courses.length;
            const done  = members.reduce((a, m) => a + m.completions.length, 0);
            const pct   = total === 0 ? 0 : Math.round(done / total * 100);
            const notStarted = members.filter(m => m.completions.length === 0).length;

            document.getElementById('statsGrid').innerHTML = [
                { label: '전체 이수율',  value: `${pct}%`,            icon: 'check-circle-2', color: 'text-emerald-600', bg: 'bg-emerald-50' },
                { label: '대상 부서원',  value: `${members.length}명`, icon: 'users',          color: 'text-blue-600',    bg: 'bg-blue-50' },
                { label: '지정 교육',    value: `${courses.length}개`, icon: 'book-open',      color: 'text-purple-600',  bg: 'bg-purple-50' },
                { label: '미시작 인원',  value: `${notStarted}명`,     icon: 'alert-circle',   color: 'text-amber-600',   bg: 'bg-amber-50' },
            ].map(item => `
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="${item.bg} p-3 rounded-lg"><i data-lucide="${item.icon}" class="${item.color} w-6 h-6"></i></div>
                    <div><p class="text-sm text-slate-500 font-medium">${item.label}</p><p class="text-2xl font-bold text-slate-900">${item.value}</p></div>
                </div>`).join('');
            if (window.lucide) lucide.createIcons();
        }

        function renderCourses() {
            document.getElementById('courseCards').innerHTML = courses.map(c => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 hover:border-blue-200 transition-colors group">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${c.mandatory ? 'bg-red-50 text-red-600' : 'bg-slate-100 text-slate-600'}">${c.mandatory ? '필수' : '선택'}</span>
                        <span class="text-xs text-slate-400 font-medium">~ ${c.deadline}</span>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-1 truncate">${c.name}</h3>
                    <p class="text-sm text-slate-500 mb-3">${c.site}</p>
                    <a href="${c.url}" target="_blank" rel="noopener noreferrer"
                       class="text-xs text-blue-600 font-semibold flex items-center gap-1 hover:underline">
                        교육 사이트 바로가기 <i data-lucide="external-link" class="w-3 h-3"></i>
                    </a>
                </div>`).join('');
            if (window.lucide) lucide.createIcons();
        }

        function renderTableHeaders() {
            let html = `<th class="p-4 text-sm font-semibold text-slate-600 border-b border-slate-100 whitespace-nowrap">부서원(직급/이름)</th>`;
            courses.forEach(c => {
                let name = c.name;
                if (name.length >= 6) {
                    if (name.includes(' ')) {
                        const parts = name.split(' '), mid = Math.ceil(parts.length / 2);
                        name = parts.slice(0,mid).join('&nbsp;') + '<br/>' + parts.slice(mid).join('&nbsp;');
                    } else {
                        const mid = Math.ceil(name.length / 2);
                        name = name.substring(0,mid) + '<br/>' + name.substring(mid);
                    }
                }
                html += `<th class="p-4 text-sm font-semibold text-slate-600 border-b border-slate-100 min-w-[110px] text-center leading-snug whitespace-nowrap">${name}</th>`;
            });
            html += `<th class="p-4 text-sm font-semibold text-slate-600 border-b border-slate-100 text-center whitespace-nowrap">진행도</th>`;
            document.getElementById('tableHeaderRow').innerHTML = html;
        }

        function renderTable() {
            const filtered = members.filter(m =>
                m.name.includes(searchTerm) || m.position.includes(searchTerm)
            );
            const emptyState = document.getElementById('emptyState');
            if (!filtered.length) {
                document.getElementById('tableBody').innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            document.getElementById('tableBody').innerHTML = filtered.map(member => {
                const progress = Math.round(member.completions.length / courses.length * 100);
                const bar = progress === 100 ? 'bg-emerald-500' : progress > 50 ? 'bg-blue-500' : 'bg-amber-500';

                let row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 border-b border-slate-100 whitespace-nowrap">
                            <div class="flex items-baseline gap-1.5">
                                <span class="text-sm text-slate-500">${member.position}</span>
                                <span class="font-bold text-slate-800">${member.name}</span>
                            </div>
                        </td>`;

                courses.forEach(course => {
                    const done = member.completions.includes(course.id);
                    // 읽기 전용 — 버튼 없이 아이콘만
                    row += `
                        <td class="p-4 border-b border-slate-100 text-center">
                            <span class="inline-flex items-center justify-center p-2 rounded-full
                                         ${done ? 'text-emerald-500 bg-emerald-50' : 'text-slate-200 bg-slate-50'}">
                                <i data-lucide="${done ? 'check-circle-2' : 'circle'}" class="w-6 h-6"></i>
                            </span>
                        </td>`;
                });

                row += `
                        <td class="p-4 border-b border-slate-100">
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-xs font-bold text-slate-600">${progress}%</span>
                                <div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div class="h-full transition-all duration-500 ${bar}" style="width:${progress}%"></div>
                                </div>
                            </div>
                        </td>
                    </tr>`;
                return row;
            }).join('');

            if (window.lucide) lucide.createIcons();
        }

        // 앱 시작
        renderTableHeaders();
        loadData();
    </script>
</body>
</html>
